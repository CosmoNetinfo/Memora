<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="google" content="notranslate" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="apple-touch-icon" href="/logo.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "99f7b2f1-0f40-4bae-a90b-6ca8777042f9",
          notifyButton: {
            enable: false,
          },
        });
      });
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Memora</title>
    <script>
      window.onerror = function(msg, url, line) {
        var div = document.createElement('div');
        div.style.color = 'red';
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.backgroundColor = 'white';
        div.style.zIndex = '99999';
        div.style.padding = '20px';
        var title = document.createElement('h3');
        title.textContent = 'Errore Globale:';
        div.appendChild(title);
        var body = document.createElement('p');
        body.textContent = String(msg) + ' | URL: ' + String(url) + ' | Linea: ' + String(line);
        div.appendChild(body);
        document.body.appendChild(div);
      };
    </script>
  </head>
    <body style="margin: 0; padding: 0; background-color: white;">
    <div id="root" style="width:100%;height:100%;min-height:100dvh;display:flex;flex-direction:column;align-items:stretch;">
      <div style="flex:1;display:flex;align-items:center;justify-content:center;font-family:sans-serif;color:#9C69A7;font-weight:bold;font-size:20px;text-align:center;padding:20px;">CARICAMENTO MEMORA...</div>
    </div>
    
    <script>
      // Timer di emergenza: se dopo 8 secondi non è apparso nulla, avvisiamo l'utente
      setTimeout(function() {
        var root = document.getElementById('root');
        if (root && root.innerHTML.indexOf('CARICAMENTO') !== -1) {
          root.textContent = '';
          var wrap = document.createElement('div');
          wrap.style.color = '#E67E22';
          var h3 = document.createElement('h3');
          h3.style.marginBottom = '10px';
          h3.textContent = 'L\'app sta impiegando troppo tempo...';
          var p = document.createElement('p');
          p.style.fontSize = '14px';
          p.style.color = '#666';
          p.textContent = 'Controlla la tua connessione internet o prova a chiudere e riaprire l\'app.';
          wrap.appendChild(h3);
          wrap.appendChild(p);
          root.appendChild(wrap);
        }
      }, 8000);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
